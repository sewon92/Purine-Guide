<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F0F4F8;--white:#FFFFFF;--text:#1A2535;--text2:#4A5568;--text3:#8A9BB0;
  --border:#DDE3EC;--primary:#4F86C6;--primary-light:#EBF3FF;
  --red:#E53E3E;--red-bg:#FFF5F5;--red-border:#FED7D7;
  --orange:#C05621;--orange-bg:#FFFAF0;--orange-border:#FEEBC8;
  --yellow:#975A16;--yellow-bg:#FFFFF0;--yellow-border:#FEFCBF;
  --green:#276749;--green-bg:#F0FFF4;--green-border:#C6F6D5;
  --shadow:0 1px 4px rgba(0,0,0,0.08);--shadow-md:0 2px 10px rgba(0,0,0,0.10);
}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}
header{background:linear-gradient(135deg,#EBF8FF 0%,#E9D8FD 100%);border-bottom:1px solid var(--border);padding:20px 16px 16px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header-top{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px}
h1{font-size:20px;font-weight:800;background:linear-gradient(90deg,#4F86C6,#38A169);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
.subtitle{text-align:center;font-size:11px;color:var(--text3);margin-bottom:10px}
.multi-hint{display:flex;align-items:center;gap:6px;max-width:500px;margin:0 auto 8px;padding:0 2px}
.multi-hint span{font-size:11px;color:#718096;white-space:nowrap}
.hint-tags{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.hint-tag{background:#EBF4FF;border:1px solid #BEE3F8;border-radius:20px;padding:4px 10px;font-size:11px;color:#2B6CB0;white-space:nowrap;cursor:pointer;font-family:inherit;flex-shrink:0}
.hint-tag.red{background:#FFF5F5;border-color:#FED7D7;color:#C53030}
.hint-tag.green{background:#F0FFF4;border-color:#C6F6D5;color:#276749}
.search-wrap{display:flex;gap:8px;max-width:500px;margin:0 auto}
input[type=text]{flex:1;background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;font-size:15px;font-family:inherit;color:var(--text);outline:none;box-shadow:var(--shadow);transition:border-color 0.2s,box-shadow 0.2s}
input[type=text]:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,134,198,0.15)}
input[type=text]::placeholder{color:var(--text3)}
.btn-search{background:linear-gradient(135deg,#4F86C6,#38A169);border:none;border-radius:12px;padding:11px 18px;color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;box-shadow:0 2px 8px rgba(79,134,198,0.35)}
.btn-search:active{opacity:0.85;transform:scale(0.97)}
.container{max-width:500px;margin:0 auto;padding:16px}
.section-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
.tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
.tag{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:13px;color:var(--text2);cursor:pointer;font-family:inherit;box-shadow:var(--shadow)}
.tag:active{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
.cat-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;-webkit-overflow-scrolling:touch}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap;box-shadow:var(--shadow);flex-shrink:0}
.cat-tab.active{background:var(--primary);border-color:var(--primary);color:#fff}
.legend{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
.legend-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.legend-row:last-child{margin-bottom:0}
.food-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.food-grid-item{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;box-shadow:var(--shadow)}
.food-grid-item:active{background:var(--primary-light);border-color:var(--primary)}
.food-grid-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.food-grid-dot.VERY_HIGH{background:var(--red)}
.food-grid-dot.HIGH{background:var(--orange)}
.food-grid-dot.MEDIUM{background:var(--yellow)}
.food-grid-dot.LOW{background:var(--green)}
.count-badge{background:var(--primary-light);color:var(--primary);border-radius:99px;padding:2px 8px;font-size:11px;font-weight:700;margin-left:6px}
.result{animation:fadeUp 0.35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.result-main{border-radius:18px;padding:22px;margin-bottom:10px;position:relative;overflow:hidden;box-shadow:var(--shadow-md);border:2px solid transparent}
.result-main.VERY_HIGH{background:var(--red-bg);border-color:var(--red-border)}
.result-main.HIGH{background:var(--orange-bg);border-color:var(--orange-border)}
.result-main.MEDIUM{background:var(--yellow-bg);border-color:var(--yellow-border)}
.result-main.LOW{background:var(--green-bg);border-color:var(--green-border)}
.result-emoji-bg{position:absolute;top:-10px;right:-10px;font-size:72px;opacity:0.1}
.result-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.result-name{font-size:22px;font-weight:800;color:var(--text);margin-bottom:3px}
.result-name-en{font-size:12px;color:var(--text3)}
.level-badge{border-radius:20px;padding:6px 13px;font-size:12px;font-weight:700;color:#fff;white-space:nowrap;flex-shrink:0}
.level-badge.VERY_HIGH{background:var(--red)}
.level-badge.HIGH{background:var(--orange)}
.level-badge.MEDIUM{background:var(--yellow)}
.level-badge.LOW{background:var(--green)}
.purine-bar-wrap{margin-top:14px;background:rgba(255,255,255,0.6);border-radius:12px;padding:12px 14px}
.purine-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.purine-mg{font-size:18px;font-weight:800}
.purine-mg.VERY_HIGH{color:var(--red)}
.purine-mg.HIGH{color:var(--orange)}
.purine-mg.MEDIUM{color:var(--yellow)}
.purine-mg.LOW{color:var(--green)}
.purine-label{font-size:10px;color:var(--text3)}
.bar-track{height:6px;background:#E2E8F0;border-radius:99px;overflow:hidden;flex:1}
.bar-fill{height:100%;border-radius:99px;transition:width 0.6s ease;width:0%}
.bar-fill.VERY_HIGH{background:var(--red)}
.bar-fill.HIGH{background:var(--orange)}
.bar-fill.MEDIUM{background:var(--yellow)}
.bar-fill.LOW{background:var(--green)}
.purine-desc{font-size:12px;color:var(--text2);line-height:1.5}
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:13px}
.card-title.blue{color:var(--primary)}
.card-title.green{color:var(--green)}
.card-title.pink{color:#C05B8A}
.tip-row{display:flex;gap:9px;margin-bottom:11px;align-items:flex-start}
.tip-row:last-child{margin-bottom:0}
.tip-num{background:var(--primary-light);color:var(--primary);border-radius:6px;width:21px;height:21px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.tip-text{font-size:13px;color:var(--text2);line-height:1.65}
.advice-text{font-size:13px;color:#2F855A;line-height:1.7}
.similar-row{display:flex;align-items:center;justify-content:space-between;background:#F7FAFC;border:1px solid var(--border);border-radius:10px;padding:10px 13px;margin-bottom:7px;cursor:pointer}
.similar-row:last-child{margin-bottom:0}
.similar-row:active{background:var(--primary-light);border-color:var(--primary)}
.similar-name{font-size:14px;color:var(--text);font-weight:500}
.similar-right{display:flex;align-items:center;gap:5px}
.similar-level{font-size:12px;font-weight:600}
.similar-level.VERY_HIGH{color:var(--red)}
.similar-level.HIGH{color:var(--orange)}
.similar-level.MEDIUM{color:var(--yellow)}
.similar-level.LOW{color:var(--green)}
.gemini-box{background:#F8F9FF;border:1.5px dashed #BCC8F5;border-radius:14px;padding:16px;margin-bottom:10px}
.gemini-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#4285F4,#34A853);border:none;border-radius:12px;padding:13px 16px;width:100%;text-decoration:none;cursor:pointer}
.gemini-btn span{font-size:14px;font-weight:700;color:#fff;font-family:inherit}
.btn-reset{width:100%;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--text3);font-size:14px;font-family:inherit;cursor:pointer;box-shadow:var(--shadow)}
.not-found{text-align:center;padding:20px 0}
.multi-item{display:flex;align-items:center;justify-content:space-between;background:#F7FAFC;border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:8px;cursor:pointer}
.multi-item:active{background:var(--primary-light);border-color:var(--primary)}
.multi-item-left{display:flex;align-items:center;gap:10px}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <span style="font-size:24px">💧</span>
    <h1>요산 퓨린 가이드</h1>
  </div>
  <p class="subtitle">음식명 입력 · 여러 재료는 띄어쓰기로 구분</p>
  <div class="multi-hint">
    <span>예시</span>
    <div class="hint-tags">
      <button class="hint-tag red" onclick="setSearch('삼겹살 맥주 새우')">삼겹살 맥주 새우</button>
      <button class="hint-tag green" onclick="setSearch('계란 두부 시금치')">계란 두부 시금치</button>
      <button class="hint-tag" onclick="setSearch('치즈 김치 볶음밥')">치즈 김치 볶음밥</button>
      <button class="hint-tag green" onclick="setSearch('닭가슴살 현미 브로콜리')">닭가슴살 현미 브로콜리</button>
    </div>
  </div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="예: 삼겹살, 계란, 두부..." autocomplete="off" autocorrect="off" autocapitalize="off">
    <button class="btn-search" id="searchBtn">검색</button>
  </div>
</header>

<div class="container">
  <div id="homeView">
    <div style="margin-bottom:16px">
      <div class="section-label">자주 찾는 음식</div>
      <div class="tags" id="quickTags"></div>
    </div>
    <div style="margin-bottom:16px">
      <div class="section-label" style="margin-bottom:10px">카테고리별 보기</div>
      <div class="cat-tabs" id="catTabs"></div>
      <div class="food-grid" id="catGrid"></div>
    </div>
    <div>
      <div class="section-label" style="margin-bottom:10px">퓨린 등급 기준</div>
      <div class="legend">
        <div class="legend-row"><span style="font-size:16px">🚫</span><span style="font-size:12px;font-weight:700;color:var(--red);width:62px;flex-shrink:0">매우 높음</span><span style="font-size:11px;color:var(--text3)">150mg/100g 이상 — 반드시 피하세요</span></div>
        <div class="legend-row"><span style="font-size:16px">⚠️</span><span style="font-size:12px;font-weight:700;color:var(--orange);width:62px;flex-shrink:0">높음</span><span style="font-size:11px;color:var(--text3)">75~150mg/100g — 소량만, 자주 먹지 마세요</span></div>
        <div class="legend-row"><span style="font-size:16px">🟡</span><span style="font-size:12px;font-weight:700;color:var(--yellow);width:62px;flex-shrink:0">보통</span><span style="font-size:11px;color:var(--text3)">30~75mg/100g — 적당량은 괜찮아요</span></div>
        <div class="legend-row"><span style="font-size:16px">✅</span><span style="font-size:12px;font-weight:700;color:var(--green);width:62px;flex-shrink:0">낮음</span><span style="font-size:11px;color:var(--text3)">30mg/100g 미만 — 안심하고 드세요</span></div>
      </div>
    </div>
  </div>
  <div id="resultView" style="display:none"></div>
</div>

<script>
const LEVEL_INFO = {
  VERY_HIGH:{label:"매우 높음",color:"#E53E3E",emoji:"🚫",barPct:100,desc:"150mg/100g 이상 — 반드시 피하세요"},
  HIGH:{label:"높음",color:"#C05621",emoji:"⚠️",barPct:70,desc:"75~150mg/100g — 소량만, 자주 먹지 마세요"},
  MEDIUM:{label:"보통",color:"#975A16",emoji:"🟡",barPct:40,desc:"30~75mg/100g — 적당량은 괜찮아요"},
  LOW:{label:"낮음",color:"#276749",emoji:"✅",barPct:15,desc:"30mg/100g 미만 — 안심하고 드세요"},
};

const CATS = ["전체","육류","해산물","채소","콩류","유제품","음료","과일","곡류","가공식품","견과류","간식"];
const QUICK = ["맥주","삼겹살","새우","멸치","두부","시금치","닭가슴살","계란","우유","커피","고등어","김치","된장찌개","삼계탕"];
let currentCat = "전체";

const DB = [
  // ── 육류 ──
  {name:"닭간",aliases:["계간","닭의간"],cat:"육류",level:"VERY_HIGH",mg:312,tips:["내장류는 퓨린이 극도로 높으므로 피하세요","조리 방법에 상관없이 섭취를 삼가는 것이 좋습니다","대신 닭가슴살로 대체하세요"],advice:"닭간은 퓨린 함량이 매우 높아 통풍 환자에게 특히 위험합니다. 내장류 전체를 피하는 것을 권장합니다.",similar:[{name:"소간",level:"VERY_HIGH"},{name:"돼지간",level:"VERY_HIGH"},{name:"닭가슴살",level:"MEDIUM"},{name:"닭날개",level:"HIGH"}]},
  {name:"소간",aliases:["쇠간","beef liver"],cat:"육류",level:"VERY_HIGH",mg:219,tips:["내장류 중에서도 퓨린이 매우 높습니다","소량도 요산 수치를 급격히 올릴 수 있습니다","철분이 필요하다면 시금치나 두부로 대체하세요"],advice:"소간은 영양가가 높지만 통풍 환자에게는 금지 식품입니다. 대체 식품으로 철분을 보충하세요.",similar:[{name:"닭간",level:"VERY_HIGH"},{name:"돼지간",level:"VERY_HIGH"},{name:"소고기",level:"HIGH"},{name:"두부",level:"MEDIUM"}]},
  {name:"돼지간",aliases:["돼지의간"],cat:"육류",level:"VERY_HIGH",mg:270,tips:["내장류는 통풍에 가장 위험한 식품군입니다","퓨린이 270mg/100g으로 극도로 높습니다","완전히 피하는 것이 좋습니다"],advice:"돼지간을 포함한 모든 내장육은 통풍 환자의 금지 식품입니다. 증상이 없을 때도 자제하세요.",similar:[{name:"소간",level:"VERY_HIGH"},{name:"닭간",level:"VERY_HIGH"},{name:"삼겹살",level:"HIGH"},{name:"돼지고기",level:"HIGH"}]},
  {name:"삼겹살",aliases:["돼지삼겹","삽겹살"],cat:"육류",level:"HIGH",mg:132,tips:["굽기보다 데치거나 삶으면 퓨린이 약 30% 줄어듭니다","1회 50g 이하로 섭취량을 제한하세요","맥주와 함께 먹으면 퓨린이 상승 작용하므로 피하세요"],advice:"삼겹살은 퓨린이 높고 지방도 많아 통풍 환자에게 이중으로 나쁩니다. 자제하는 것이 좋습니다.",similar:[{name:"목살",level:"HIGH"},{name:"등심",level:"HIGH"},{name:"닭가슴살",level:"MEDIUM"},{name:"두부",level:"MEDIUM"}]},
  {name:"목살",aliases:["돼지목살","목심"],cat:"육류",level:"HIGH",mg:119,tips:["퓨린 함량이 높으므로 소량 섭취하세요","삶거나 데치면 퓨린이 육수로 빠져나가 줄어듭니다","육수는 마시지 마세요"],advice:"목살은 삼겹살보다 다소 낮지만 여전히 고퓨린 식품입니다. 주 1~2회, 소량으로 제한하세요.",similar:[{name:"삼겹살",level:"HIGH"},{name:"앞다리",level:"HIGH"},{name:"닭가슴살",level:"MEDIUM"},{name:"오리고기",level:"HIGH"}]},
  {name:"소고기",aliases:["beef","쇠고기","한우"],cat:"육류",level:"HIGH",mg:110,tips:["등심, 안심 부위가 상대적으로 낫습니다","굽기보다 끓이면 퓨린이 줄어듭니다","1회 60g 이하로 제한하세요"],advice:"소고기는 고퓨린 식품이지만 부위와 조리법에 따라 영향이 다릅니다. 적은 양을 자주 먹지 말고 가끔 소량만 드세요.",similar:[{name:"돼지고기",level:"HIGH"},{name:"양고기",level:"HIGH"},{name:"닭가슴살",level:"MEDIUM"},{name:"오리고기",level:"HIGH"}]},
  {name:"닭가슴살",aliases:["chicken breast","계육"],cat:"육류",level:"MEDIUM",mg:53,tips:["껍질을 제거하면 퓨린과 지방을 동시에 줄일 수 있습니다","삶거나 찌는 방법이 가장 좋습니다","하루 100g 이내로 적당히 섭취하세요"],advice:"닭가슴살은 육류 중 퓨린이 낮은 편이라 통풍 환자에게 적합한 단백질 공급원입니다. 껍질 제거 후 섭취하세요.",similar:[{name:"닭날개",level:"HIGH"},{name:"닭다리",level:"HIGH"},{name:"두부",level:"MEDIUM"},{name:"계란",level:"LOW"}]},
  {name:"닭다리",aliases:["닭봉","drumstick"],cat:"육류",level:"HIGH",mg:89,tips:["껍질을 제거하면 퓨린을 줄일 수 있습니다","튀김보다 삶거나 구워서 드세요","주 2회 이하로 제한하세요"],advice:"닭다리는 가슴살보다 퓨린이 높습니다. 껍질 제거 후 적당량 드세요.",similar:[{name:"닭날개",level:"HIGH"},{name:"닭가슴살",level:"MEDIUM"},{name:"오리고기",level:"HIGH"},{name:"삼겹살",level:"HIGH"}]},
  {name:"닭날개",aliases:["치킨날개","윙"],cat:"육류",level:"HIGH",mg:137,tips:["껍질과 지방이 많아 퓨린 외에도 주의가 필요합니다","튀긴 치킨 형태는 피하세요","삶아서 껍질 제거 후 소량만 드세요"],advice:"닭날개는 퓨린이 높고 튀길 경우 더욱 좋지 않습니다. 가급적 닭가슴살로 대체하세요.",similar:[{name:"닭다리",level:"HIGH"},{name:"닭가슴살",level:"MEDIUM"},{name:"삼겹살",level:"HIGH"},{name:"오리고기",level:"HIGH"}]},
  {name:"오리고기",aliases:["오리","duck"],cat:"육류",level:"HIGH",mg:138,tips:["퓨린 함량이 높으므로 소량 섭취하세요","껍질 제거 후 조리하면 도움이 됩니다","주 1회 이하로 제한하세요"],advice:"오리고기는 건강식으로 알려졌지만 통풍 환자에겐 고퓨린 식품입니다. 자제하세요.",similar:[{name:"닭날개",level:"HIGH"},{name:"삼겹살",level:"HIGH"},{name:"닭가슴살",level:"MEDIUM"},{name:"소고기",level:"HIGH"}]},
  {name:"양고기",aliases:["lamb","양"],cat:"육류",level:"HIGH",mg:96,tips:["퓨린이 높으므로 소량만 드세요","삶거나 끓이면 퓨린이 일부 줄어듭니다","자주 먹지 않는 것이 좋습니다"],advice:"양고기는 고퓨린 식품으로 통풍 환자에게 권장되지 않습니다.",similar:[{name:"소고기",level:"HIGH"},{name:"돼지고기",level:"HIGH"},{name:"닭가슴살",level:"MEDIUM"},{name:"두부",level:"MEDIUM"}]},
  {name:"돼지고기",aliases:["pig","돼지"],cat:"육류",level:"HIGH",mg:114,tips:["부위별로 퓨린 차이가 있습니다 (안심 < 삼겹살)","조리 시 삶거나 데치는 방법이 좋습니다","육수는 퓨린이 많으므로 먹지 마세요"],advice:"돼지고기는 부위에 따라 퓨린이 다르지만 전반적으로 고퓨린 식품군입니다.",similar:[{name:"삼겹살",level:"HIGH"},{name:"목살",level:"HIGH"},{name:"닭가슴살",level:"MEDIUM"},{name:"두부",level:"MEDIUM"}]},
  {name:"소시지",aliases:["소세지","sausage"],cat:"육류",level:"HIGH",mg:120,tips:["가공육은 퓨린 외에도 나트륨이 높아 이중으로 주의가 필요합니다","주 1회 이하, 소량만 드세요","프랑크푸르트, 비엔나 소시지 모두 해당됩니다"],advice:"소시지는 가공 과정에서 퓨린이 농축되는 경향이 있습니다. 자주 드시지 마세요.",similar:[{name:"햄",level:"HIGH"},{name:"베이컨",level:"HIGH"},{name:"닭가슴살",level:"MEDIUM"},{name:"계란",level:"LOW"}]},
  {name:"햄",aliases:["ham","런천미트"],cat:"육류",level:"HIGH",mg:104,tips:["나트륨도 높아 요산 배출에 방해가 될 수 있습니다","가공육 전반을 자제하세요","대체 단백질로 두부나 계란을 활용하세요"],advice:"햄은 가공육으로 퓨린과 나트륨 모두 높습니다. 통풍 환자에게 좋지 않은 식품입니다.",similar:[{name:"소시지",level:"HIGH"},{name:"베이컨",level:"HIGH"},{name:"닭가슴살",level:"MEDIUM"},{name:"두부",level:"MEDIUM"}]},
  {name:"베이컨",aliases:["bacon"],cat:"육류",level:"HIGH",mg:98,tips:["가공육으로 퓨린이 높고 포화지방도 많습니다","주 1회 이하로 제한하세요","아침 식사 대용으로 계란을 활용하세요"],advice:"베이컨은 통풍 환자에게 권장하지 않는 가공육입니다. 가급적 피하세요.",similar:[{name:"햄",level:"HIGH"},{name:"소시지",level:"HIGH"},{name:"닭가슴살",level:"MEDIUM"},{name:"계란",level:"LOW"}]},

  // ── 해산물 ──
  {name:"멸치",aliases:["anchovy","멸치볶음"],cat:"해산물",level:"VERY_HIGH",mg:239,tips:["말린 멸치는 수분이 증발해 퓨린이 극도로 농축됩니다","멸치 국물(육수)에도 퓨린이 많이 용출됩니다","다시마 국물로 대체하는 것을 권장합니다"],advice:"멸치는 소형 어류 중 퓨린이 가장 높은 편입니다. 멸치 볶음, 멸치 국물 모두 자제하세요.",similar:[{name:"정어리",level:"VERY_HIGH"},{name:"고등어",level:"HIGH"},{name:"참치",level:"HIGH"},{name:"명태",level:"MEDIUM"}]},
  {name:"정어리",aliases:["sardine","살딩"],cat:"해산물",level:"VERY_HIGH",mg:345,tips:["퓨린이 345mg/100g으로 식품 중 최고 수준입니다","통조림 형태도 동일하게 주의가 필요합니다","완전히 피하는 것이 좋습니다"],advice:"정어리는 퓨린 함량이 식품 중 가장 높은 수준입니다. 통풍 환자는 반드시 피해야 합니다.",similar:[{name:"멸치",level:"VERY_HIGH"},{name:"고등어",level:"HIGH"},{name:"참치",level:"HIGH"},{name:"대구",level:"MEDIUM"}]},
  {name:"고등어",aliases:["mackerel","고등어구이","고등어조림"],cat:"해산물",level:"HIGH",mg:194,tips:["구이보다 조림 시 퓨린이 일부 줄어듭니다","1회 60g 이하로 드세요","주 1~2회로 제한하세요"],advice:"고등어는 오메가3가 풍부하지만 퓨린도 높습니다. 적당한 빈도와 양을 지켜 드세요.",similar:[{name:"정어리",level:"VERY_HIGH"},{name:"참치",level:"HIGH"},{name:"삼치",level:"HIGH"},{name:"가자미",level:"MEDIUM"}]},

function normalize(s){ return s.replace(/\s/g,"").toLowerCase(); }

function findFood(q){
  var nq = normalize(q);
  var best = null, bestScore = 0;
  for(var i=0;i<DB.length;i++){
    var f = DB[i];
    var names = [f.name].concat(f.aliases||[]);
    for(var j=0;j<names.length;j++){
      var nn = normalize(names[j]);
      // 완전 일치
      if(nn === nq){ return f; }
      // DB 이름이 검색어에 포함 (예: "김치"가 "김치찜"에 포함)
      // → 검색어가 DB이름보다 훨씬 길면 점수 낮춤
      if(nq.indexOf(nn) >= 0){
        var score = nn.length / nq.length; // 검색어 대비 DB이름 비율
        if(score > bestScore){ bestScore = score; best = f; }
      }
      // 검색어가 DB 이름에 포함 (예: "삼겹"이 "삼겹살"에 포함)
      if(nn.indexOf(nq) >= 0){
        var score = nq.length / nn.length;
        if(score > bestScore){ bestScore = score; best = f; }
      }
    }
  }
  // 점수 0.6 이상일 때만 매칭 (더 엄격하게)
  if(best && bestScore >= 0.6){ best._partial = bestScore < 1.0; return best; }
  return null;
}

function geminiURL(q){
  return "https://www.google.com/search?q=" + encodeURIComponent(q + " 퓨린 함량 통풍 주의사항");
}

function doSearch(){
  var q = document.getElementById("searchInput").value.trim();
  if(!q) return;
  var terms = q.split(/[\s,+]+/).filter(function(t){ return t.length > 0; });
  if(terms.length === 1){
    var food = findFood(terms[0]);
    if(food) showResult(food);
    else showNotFound(terms[0]);
  } else {
    showMultiResult(terms);
  }
}

function setSearch(text){
  document.getElementById("searchInput").value = text;
  doSearch();
}

function searchFood(name){
  document.getElementById("searchInput").value = name;
  doSearch();
}

function goHome(){
  document.getElementById("homeView").style.display = "block";
  document.getElementById("resultView").style.display = "none";
  document.getElementById("searchInput").value = "";
  renderCat(currentCat);
}

      '<svg width="14" height="14" viewBox="0 0 24 24" style="flex-shrink:0"><path fill="white" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="white" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="white" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="white" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg><span style='font-size:12px;font-weight:700;color:#fff'>구글</span></a>' +
    '</div>';
  }

  rv.innerHTML = '<div class="result">' +
    partialHTML +
    '<div class="result-main ' + food.level + '">' +
      '<div class="result-emoji-bg">' + li.emoji + '</div>' +
      '<div class="result-header">' +
        '<div><div class="result-name">' + food.name + '</div>' +
        (food.aliases&&food.aliases.length?'<div class="result-name-en">'+food.aliases[0]+'</div>':'') +
        '</div>' +
        '<span class="level-badge ' + food.level + '">' + li.emoji + ' ' + li.label + '</span>' +
      '</div>' +
      '<div class="purine-bar-wrap">' +
        '<div class="purine-row">' +
          '<div><div class="purine-mg ' + food.level + '">약 ' + food.mg + 'mg</div>' +
          '<div class="purine-label">/ 100g 기준</div></div>' +
          '<div class="bar-track"><div class="bar-fill ' + food.level + '" id="barFill"></div></div>' +
        '</div>' +
        '<div class="purine-desc">' + li.desc + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="card"><div class="card-title blue">🍳 조리 & 섭취 유의사항</div>' + tipsHTML + '</div>' +
    '<div class="card" style="background:#F0FFF4;border-color:#C6F6D5"><div class="card-title green">💬 전문가 조언</div><p class="advice-text">' + food.advice + '</p></div>' +
    '<div class="card"><div class="card-title pink">🔍 유사 음식 비교</div>' + similarHTML + '</div>' +
    '<div class="gemini-box">' +
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span style="font-size:16px">🔍</span><span style="font-size:13px;font-weight:700;color:#1A2535">더 자세히 알고 싶으세요?</span></div>' +
      '<div style="font-size:12px;color:#718096;margin-bottom:12px;line-height:1.6">더 상세한 정보는 구글에서 검색해보세요</div>' +
      geminiBtn(food.name) +
      '<div style="font-size:11px;color:#A0AEC0;text-align:center;margin-top:6px">탭하면 구글 검색 결과로 이동해요</div>' +
    '</div>' +
    '<button class="btn-reset" onclick="goHome()">← 홈으로 돌아가기</button>' +
  '</div>';

  setTimeout(function(){
    var bar = document.getElementById("barFill");
    if(bar) bar.style.width = li.barPct + "%";
  }, 100);
}

function showNotFound(q){
  var rv = document.getElementById("resultView");
  document.getElementById("homeView").style.display = "none";
  rv.style.display = "block";
  rv.innerHTML = '<div class="not-found">' +
    '<div class="gemini-box" style="text-align:left;margin-bottom:12px">' +
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:16px">🔍</span><span style="font-size:13px;font-weight:700;color:#1A2535">"' + q + '" 데이터가 없어요</span></div>' +
      '<div style="font-size:12px;color:#718096;margin-bottom:14px;line-height:1.6">비슷한 이름으로 다시 검색하거나<br>구글에서 바로 확인해보세요</div>' +
      geminiBtn(q) +
      '<div style="font-size:11px;color:#A0AEC0;text-align:center;margin-top:6px">탭하면 구글이 바로 답변해줘요</div>' +
    '</div>' +
    '<div style="background:#FFF8F0;border:1px solid #FEEBC8;border-radius:12px;padding:14px;margin-bottom:16px;text-align:left">' +
      '<div style="font-size:12px;font-weight:700;color:#975A16;margin-bottom:8px">💡 이렇게 검색해보세요</div>' +
      '<div style="font-size:12px;color:#744210;line-height:1.8">• "새우볶음" → <b>새우</b><br>• "삼겹살구이" → <b>삼겹살</b><br>• "계란후라이" → <b>계란</b></div>' +
    '</div>' +
    '<button class="btn-reset" onclick="goHome()">← 홈으로 돌아가기</button>' +
  '</div>';
}

function showMultiResult(terms){
  var rv = document.getElementById("resultView");
  document.getElementById("homeView").style.display = "none";
  rv.style.display = "block";

  var found = [], notFound = [];
  for(var i=0;i<terms.length;i++){
    var food = findFood(terms[i]);
    if(food) found.push({term:terms[i],food:food});
    else notFound.push(terms[i]);
  }

  var totalMg = 0;
  for(var i=0;i<found.length;i++) totalMg += found[i].food.mg;

  var order = {VERY_HIGH:4,HIGH:3,MEDIUM:2,LOW:1};
  var maxLevel = "LOW";
  for(var i=0;i<found.length;i++){
    if(order[found[i].food.level] > order[maxLevel]) maxLevel = found[i].food.level;
  }
  var maxInfo = LEVEL_INFO[maxLevel];

  var foundHTML = "";
  for(var i=0;i<found.length;i++){
    var r = found[i]; var li = LEVEL_INFO[r.food.level];
    foundHTML += '<div class="multi-item" onclick="searchFood(\'' + r.food.name + '\')">' +
      '<div class="multi-item-left"><span style="font-size:20px">' + li.emoji + '</span>' +
      '<div><div style="font-size:14px;font-weight:600;color:#1A2535">' + r.food.name + '</div>' +
      '<div style="font-size:11px;color:#A0AEC0">' + r.food.cat + '</div></div></div>' +
      '<div style="display:flex;align-items:center;gap:7px;flex-shrink:0">' +
      '<span style="font-size:13px;font-weight:700;color:' + li.color + '">약 ' + r.food.mg + 'mg</span>' +
      '<span class="level-badge ' + r.food.level + '" style="font-size:11px;padding:3px 8px">' + li.label + '</span></div>' +
    '</div>';
  }

  var notFoundHTML = notFound.length > 0 ?
    '<div style="margin-top:10px;padding:12px;background:#FFF8F0;border:1px solid #FEEBC8;border-radius:10px;font-size:12px;color:#975A16">⚠️ 데이터 없음: ' + notFound.join(", ") + '</div>' : "";

  var totalDesc = totalMg>=400?"매우 위험 — 통풍 발작 위험":totalMg>=200?"주의 — 요산 수치가 오를 수 있어요":totalMg>=100?"보통 — 적당량이면 괜찮아요":"안전 — 퓨린이 낮은 조합이에요";
  var advice = totalMg>=400?"고퓨린 재료를 줄이거나 피하세요.":totalMg>=200?"양을 줄이고 물을 충분히 드세요.":totalMg>=100?"과식하지 않도록 주의하세요.":"안심하고 드셔도 됩니다.";

  rv.innerHTML = '<div class="result">' +
    '<div style="background:#F7FAFC;border:1px solid #E2E8F0;border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.06)">' +
      '<div style="font-size:12px;color:#A0AEC0;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">🍽️ 복합 분석</div>' +
      '<div style="font-size:20px;font-weight:800;color:#1A2535;margin-bottom:4px">총 퓨린 합계</div>' +
      '<div style="font-size:28px;font-weight:800;color:' + maxInfo.color + ';margin-bottom:8px">' + totalMg + 'mg</div>' +
      '<div style="background:#F7FAFC;border:1px solid #E2E8F0;border-radius:10px;padding:10px 14px;font-size:13px;color:#4A5568">' + maxInfo.emoji + ' ' + totalDesc + '</div>' +
    '</div>' +
    '<div class="card"><div class="card-title blue">📋 재료별 퓨린</div>' + foundHTML + notFoundHTML + '</div>' +
    '<div class="card" style="background:#F0FFF4;border-color:#C6F6D5"><div class="card-title green">💬 조합 조언</div><p class="advice-text">' + advice + ' 각 재료를 탭하면 상세 정보를 볼 수 있어요.</p></div>' +
    '<button class="btn-reset" onclick="goHome()">← 홈으로 돌아가기</button>' +
  '</div>';
}

function renderCat(cat){
  currentCat = cat;
  document.querySelectorAll(".cat-tab").forEach(function(t){
    t.classList.toggle("active", t.dataset.cat === cat);
  });
  var foods = cat === "전체"
    ? DB.slice().sort(function(a,b){var o={VERY_HIGH:0,HIGH:1,MEDIUM:2,LOW:3};return o[a.level]-o[b.level];}).slice(0,40)
    : DB.filter(function(f){ return f.cat === cat; });
  var grid = document.getElementById("catGrid");
  grid.innerHTML = foods.map(function(f){
    var li = LEVEL_INFO[f.level];
    return '<div class="food-grid-item" onclick="searchFood(\'' + f.name + '\')">' +
      '<span style="font-size:13px;color:#2D3748;font-weight:500">' + li.emoji + ' ' + f.name + '</span>' +
      '<span class="food-grid-dot ' + f.level + '"></span>' +
    '</div>';
  }).join("");
}

window.onload = function(){
  // 검색 버튼
  document.getElementById("searchBtn").addEventListener("click", doSearch);
  // 엔터키
  document.getElementById("searchInput").addEventListener("keydown", function(e){
    if(e.key === "Enter") doSearch();
  });
  // 퀵태그
  var tagsEl = document.getElementById("quickTags");
  tagsEl.innerHTML = QUICK.map(function(t){
    return '<button class="tag" onclick="searchFood(\'' + t + '\')">' + t + '</button>';
  }).join("");
  // 카테고리 탭
  var tabsEl = document.getElementById("catTabs");
  tabsEl.innerHTML = CATS.map(function(c){
    var cnt = c==="전체" ? DB.length : DB.filter(function(f){return f.cat===c;}).length;
    return '<button class="cat-tab' + (c==="전체"?" active":"") + '" data-cat="' + c + '" onclick="renderCat(\'' + c + '\')">' + c + '<span class="count-badge">' + cnt + '</span></button>';
  }).join("");
  renderCat("전체");
};

if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('worker.js');
  });
}
</script>
